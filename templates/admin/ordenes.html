    <link rel="icon" href="data:,">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<body class="admin-body">

            <a href="/admin/productos" class="admin-nav-link">Productos</a>

            <a href="/admin/usuarios" class="admin-nav-link">Usuarios</a>
            <a href="/admin/settings" class="admin-nav-link nav-settings">Settings</a>
        </div>
        <button class="admin-logout" onclick="logout()">Salir</button>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1 class="admin-title">Órdenes</h1>
            <div class="admin-filtros-status">
                <button class="filtro-status active" data-status="" onclick="filtrarOrdenes('', this)">
                    Todas
                </button>
                <button class="filtro-status" data-status="pending" onclick="filtrarOrdenes('pending', this)">
                    Pendientes
                </button>
                <button class="filtro-status" data-status="paid" onclick="filtrarOrdenes('paid', this)">
                    Pagadas
                </button>
                <button class="filtro-status" data-status="preparing" onclick="filtrarOrdenes('preparing', this)">
                    Preparando
                </button>
                <button class="filtro-status" data-status="shipped" onclick="filtrarOrdenes('shipped', this)">
                    Enviadas
                </button>
            </div>
        </div>

        <div class="admin-tabla-wrapper">
            <table class="admin-tabla" id="tabla-ordenes">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Cliente</th>
                        <th>Ciudad</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tbody-ordenes">
                    <tr>
                        <td colspan="8" style="text-align:center;color:var(--text-muted)">
                            Cargando...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="/static/admin.js"></script>
    <script>
        verificarAdmin();
        document.addEventListener("DOMContentLoaded", updateSettingsLink);
        cargarOrdenes("");

        async function cargarOrdenes(status) {
            const url = status ? `/api/admin/ordenes?status=${status}` : "/api/admin/ordenes";
            const ordenes = await apiAdmin(url);
            if (!ordenes) return;

            const tbody = document.getElementById("tbody-ordenes");

            if (ordenes.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8"
                    style="text-align:center;color:var(--text-muted)">
                    No hay órdenes.</td></tr>`;
                return;
            }

            const statusLabel = {
                pending: "Pendiente",
                paid: "Pagada",
                preparing: "Preparando",
                shipped: "Enviada",
                delivered: "Entregada",
                cancelled: "Cancelada",
            };

            const nextStatus = {
                pending: "paid",
                paid: "preparing",
                preparing: "shipped",
                shipped: "delivered",
            };

            const nextLabel = {
                pending: "Marcar pagada",
                paid: "Preparando",
                preparing: "Marcar enviada",
                shipped: "Marcar entregada",
            };

            tbody.innerHTML = ordenes.map(o => {
                const fecha = new Date(o.created_at).toLocaleDateString("es-AR");
                const itemsText = o.items.map(i => `${i.product_name} ×${i.quantity}`).join(", ");
                const next = nextStatus[o.status];

                return `
                    <tr>
                        <td>#${o.id}</td>
                        <td><strong>${o.nombre}</strong></td>
                        <td>${o.ciudad || "—"}</td>
                        <td style="font-size:0.82rem;color:var(--text-muted);max-width:200px">
                            ${itemsText}
                        </td>
                        <td>$${o.total.toLocaleString("es-AR")}</td>
                        <td>
                            <span class="admin-badge badge-${o.status}">
                                ${statusLabel[o.status] || o.status}
                            </span>
                        </td>
                        <td style="font-size:0.82rem;color:var(--text-muted)">${fecha}</td>
                        <td>
                            ${next ? `
                                <button class="admin-btn-sm"
                                        onclick="avanzarEstado(${o.id}, '${next}')">
                                    ${nextLabel[o.status]}
                                </button>
                            ` : "—"}
                        </td>
                    </tr>
                `;
            }).join("");
        }

        async function avanzarEstado(id, status) {
            await apiAdmin(`/api/admin/ordenes/${id}/status`, "PUT", { status });
            const statusActual = document.querySelector(".filtro-status.active").dataset.status;
            cargarOrdenes(statusActual);
        }

        function filtrarOrdenes(status, el) {
            document.querySelectorAll(".filtro-status").forEach(b => b.classList.remove("active"));
            el.classList.add("active");
            cargarOrdenes(status);
        }
    </script>
</body>

</html>
